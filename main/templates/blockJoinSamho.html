{% extends "rootCloud.html" %}

{% block contents %}

<div class="join-wrapper">
  <form action="/member/joinSamho" method="POST" class="join-form">
    <h2 class="join-title">Join</h2>
    <p class="join-subtitle">Hi-TESS CLOUD 사용을 위해 사번을 입력해 주세요.</p>
    
    <div class="input-group">
      <label for="company">회 사</label>
      <select name="company" id="company" required>
        <option value="HD 현대중공업" selected>HD 현대중공업</option>
        <option value="HD 현대삼호" selected>HD 현대삼호</option>
      </select>
    </div>

    <div class="input-group">      
      <label for="id">사 번</label>
      <input type="text" name="id" id="id" placeholder="사번 입력" required autocomplete="off">
      <input type="hidden" name="hidden" value="confirm">
    </div>

    <div class="info-group">
      <label>이 름</label>
      <input type="text" name="name" value="" placeholder="이름 입력" required autocomplete="off">
    </div>
    <div class="info-group">
      <label>직 급</label>
      <select name="rank" id="rank" required autocomplete="off">
        <option value="책임엔지니어" selected>책임엔지니어</option>
        <option value="선임엔지니어" >선임엔지니어</option>
        <option value="엔지니어" >엔지니어</option>        
      </select>
    </div>
    <div class="info-group">
      <label>부 서</label>
      <input type="text" name="division" value="" placeholder="부서 입력" required autocomplete="off">
    </div>

    <p class="join-notice">* 관리자 승인 후 프로그램 이용이 가능합니다.</p>

    <button type="submit" class="btn-join">가입 신청</button>    
  </form>
</div>


<script>
  document.addEventListener('DOMContentLoaded', function () {
    const companySelect = document.getElementById('company');

    companySelect.addEventListener('change', function () {
      const selectedCompany = companySelect.value;

      if (selectedCompany === 'HD 현대중공업') {
        // HD 현대삼호 선택 시 즉시 이동
        window.location.href = '/member/join';
      }
    });
  }); 

</script>
        
{% endblock %}
