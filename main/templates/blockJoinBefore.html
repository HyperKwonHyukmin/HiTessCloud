{% extends "rootCloud.html" %}

{% block contents %}
<div class="join-wrapper">
  <form action="/member/join" method="POST" class="join-form">
    <h2 class="join-title">Join</h2>
    <p class="join-subtitle">Hi-TESS CLOUD 사용을 위해 가입 정보를 입력해 주세요.</p>

    <div class="input-group">
      <label for="company">회 사</label>
      <select name="company" id="company" required>
        <option value="HD 현대중공업" selected>HD 현대중공업</option>
        <option value="HD 현대삼호">HD 현대삼호</option>
      </select>
    </div>

    <div class="input-group">
      <label for="id">사 번</label>
      <input type="text" name="id" id="id" placeholder="사번(ID) 입력" required autocomplete="off">
    </div>

    <div class="input-group">
      <label for="name">이 름</label>
      <input type="text" name="name" id="name" placeholder="성함 입력" required>
    </div>

    <div class="input-group">
      <label for="rank">직 급</label>
      <select name="rank" id="rank" required style="width:100%; height:42px; border-radius:6px; padding:10px;">
        <option value="" disabled selected>직급 선택</option>
        <option value="책임엔지니어">책임엔지니어</option>
        <option value="책임매니저">책임매니저</option>
        <option value="책임연구원">책임연구원</option>
        <option value="선임엔지니어">선임엔지니어</option>
        <option value="선임매니저">선임매니저</option>
        <option value="선임연구원">선임연구원</option>
        <option value="엔지니어">엔지니어</option>
        <option value="매니저">매니저</option>
        <option value="연구원">연구원</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div class="input-group">
      <label for="division">부 서</label>
      <input type="text" name="division" id="division" placeholder="소속 부서명 입력" required>
    </div>

    <p class="join-notice" style="color: #d63031; font-weight: bold; margin-top: 15px;">* 관리자 승인 후 프로그램 이용이 가능합니다.</p>

    <button type="submit" class="btn-join" style="margin-top: 20px;">가입 신청</button>
  </form>
</div>

<script>
  // 현대삼호 선택 시 전용 페이지 이동 로직 유지
  document.addEventListener('DOMContentLoaded', function () {
    const companySelect = document.getElementById('company');
    companySelect.addEventListener('change', function () {
      if (companySelect.value === 'HD 현대삼호') {
        window.location.href = '/member/joinSamho';
      }
    });
  });
</script>
{% endblock %}
